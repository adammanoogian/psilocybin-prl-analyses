# Conda environment for PRL HGF Analysis (GPU-accelerated MCMC)
# Minimal env for GPU fitting, validation, and group analysis on M3 cluster.
#
# Usage:
#   # On M3 cluster:
#   module load miniforge3
#   mamba env create -f environment_gpu.yml
#   conda activate prl_gpu
#
# Or use the setup script:
#   bash cluster/00_setup_env_gpu.sh
#
# Note: CUDA module is NOT required. JAX pip packages bundle their own CUDA
# runtime libraries. GPU access works via the cluster's NVIDIA kernel driver.
#
# Headless plotting (Agg backend) included for post-processing figures on
# cluster. GUI packages (ipywidgets, ipympl, ptitprince) are excluded —
# use the local ds_env environment for interactive exploration.

name: prl_gpu
channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.10

  # Data handling
  - pandas>=2.0.0
  - numpy>=2.0.0
  - scipy>=1.10.0
  - matplotlib>=3.7
  - pyyaml>=6.0

  # Note: Do NOT install cuda-nvcc or other CUDA packages via conda.
  # JAX's pip packages bundle compatible CUDA libraries (cuSPARSE, cuBLAS, etc.)
  # Mixing conda and pip CUDA causes library conflicts.

  # pip dependencies
  - pip
  - pip:
    # JAX with CUDA 12 support (pyhgf 0.2.8 requires jax<0.4.32)
    - jax[cuda12]>=0.4.26,<0.4.32
    # Bayesian inference
    - pymc>=5.25.1
    - pytensor
    - arviz>=0.21.0
    # HGF modelling
    - pyhgf>=0.2.8,<0.3
    # Model comparison
    - groupBMC>=1.0
    # Group analysis (bambi needed by 06_group_analysis.py)
    - bambi>=0.13.0
    - pingouin>=0.5.5
    - pyarrow>=14.0
